<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editor mapy | Vize Rtyně</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body{background:#111;color:#fff;overflow:hidden}
    .editor-app{height:100svh;display:grid;grid-template-columns:minmax(0,1fr) 360px}
    .editor-map{position:relative;overflow:hidden;background:#111;cursor:crosshair}
    .editor-map img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;user-select:none;pointer-events:none}
    .editor-point{position:absolute;left:var(--x);top:var(--y);width:30px;height:30px;border:0;border-radius:999px;background:#fff;box-shadow:0 10px 28px rgba(0,0,0,.32),0 0 0 7px rgba(255,255,255,.28);transform:translate(-50%,-50%);cursor:grab;z-index:3}
    .editor-point:hover,.editor-point.active{background:#111;box-shadow:0 10px 28px rgba(0,0,0,.32),0 0 0 7px rgba(255,255,255,.65)}
    .editor-point:active{cursor:grabbing}
    .editor-label{position:absolute;left:50%;bottom:calc(100% + 12px);transform:translateX(-50%);background:#fff;color:#111;padding:7px 11px;border-radius:999px;font-size:14px;font-weight:850;white-space:nowrap;box-shadow:0 10px 28px rgba(0,0,0,.22)}
    .editor-panel{padding:24px;background:#101810;border-left:1px solid rgba(255,255,255,.12);overflow:auto}
    .editor-panel h1{margin:0 0 8px;font-size:26px;letter-spacing:-.03em}
    .editor-panel p{margin:0 0 18px;color:rgba(255,255,255,.72);line-height:1.45;font-weight:650}
    .editor-list{display:grid;gap:8px;margin:18px 0}
    .editor-place{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:#fff;border-radius:14px;padding:11px 12px;text-align:left;font-weight:800;cursor:pointer}
    .editor-place.active{background:#fff;color:#111}
    .editor-coords{padding:14px;border-radius:14px;background:rgba(255,255,255,.08);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.55;margin:16px 0;white-space:pre-wrap}
    .editor-actions{display:grid;gap:10px;margin-top:14px}
    .editor-actions button,.editor-actions a{border:0;border-radius:999px;padding:13px 16px;font-weight:900;cursor:pointer;text-align:center;background:#fff;color:#111;text-decoration:none}
    .editor-actions button.secondary{background:rgba(255,255,255,.12);color:#fff}
    .editor-output{width:100%;min-height:220px;margin-top:16px;border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:12px;background:#050805;color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.45;resize:vertical}
    .editor-help{font-size:13px;color:rgba(255,255,255,.62);margin-top:18px}
    @media(max-width:900px){.editor-app{grid-template-columns:1fr;grid-template-rows:60svh 40svh}.editor-panel{border-left:0;border-top:1px solid rgba(255,255,255,.12)}}
  </style>
</head>
<body>
  <main class="editor-app">
    <section class="editor-map" id="editorMap" aria-label="Editor pozic na mapě">
      <img src="images/mapa/rtyne-letecky.jpg" alt="Letecký pohled na Rtyni" />
      <div id="editorPoints"></div>
    </section>

    <aside class="editor-panel">
      <h1>Editor mapy</h1>
      <p>Přetáhni bod myší na správné místo. Potom stáhni nový <strong>places.json</strong> a nahraj ho na GitHub do složky <strong>data</strong>.</p>
      <div class="editor-list" id="editorList"></div>
      <div class="editor-coords" id="editorCoords">Vyber bod.</div>
      <div class="editor-actions">
        <button type="button" id="copyJson">Kopírovat JSON</button>
        <button type="button" id="downloadJson">Stáhnout places.json</button>
        <a href="index.html">Zpět na web</a>
      </div>
      <textarea class="editor-output" id="editorOutput" spellcheck="false"></textarea>
      <div class="editor-help">Poznámka: editor nic neukládá na web automaticky. Změny se projeví až po nahrání exportovaného souboru <strong>data/places.json</strong> do GitHubu.</div>
    </aside>
  </main>

  <script>
    (function () {
      const map = document.getElementById('editorMap');
      const pointsEl = document.getElementById('editorPoints');
      const listEl = document.getElementById('editorList');
      const coordsEl = document.getElementById('editorCoords');
      const outputEl = document.getElementById('editorOutput');
      const copyBtn = document.getElementById('copyJson');
      const downloadBtn = document.getElementById('downloadJson');

      let places = [];
      let activeId = null;
      let draggingId = null;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function format(value) {
        return Number(value).toFixed(2);
      }

      function setActive(id) {
        activeId = id;
        document.querySelectorAll('.editor-point').forEach((point) => point.classList.toggle('active', point.dataset.id === id));
        document.querySelectorAll('.editor-place').forEach((button) => button.classList.toggle('active', button.dataset.id === id));
        updateOutput();
      }

      function updateOutput() {
        const active = places.find((place) => place.id === activeId) || places[0];
        if (active) {
          coordsEl.textContent = `${active.title}\nx: ${format(active.x)}\ny: ${format(active.y)}\n\nstyle="--x:${format(active.x)}%; --y:${format(active.y)}%;"`;
        }
        outputEl.value = JSON.stringify(places.map((place) => ({
          id: place.id,
          title: place.title,
          x: Number(format(place.x)),
          y: Number(format(place.y))
        })), null, 2);
      }

      function movePlace(id, clientX, clientY) {
        const rect = map.getBoundingClientRect();
        const x = clamp(((clientX - rect.left) / rect.width) * 100, 0, 100);
        const y = clamp(((clientY - rect.top) / rect.height) * 100, 0, 100);
        const place = places.find((item) => item.id === id);
        if (!place) return;
        place.x = Number(format(x));
        place.y = Number(format(y));
        const point = document.querySelector(`.editor-point[data-id="${CSS.escape(id)}"]`);
        if (point) {
          point.style.setProperty('--x', `${place.x}%`);
          point.style.setProperty('--y', `${place.y}%`);
        }
        updateOutput();
      }

      function render() {
        pointsEl.innerHTML = '';
        listEl.innerHTML = '';

        places.forEach((place) => {
          const point = document.createElement('button');
          point.className = 'editor-point';
          point.type = 'button';
          point.dataset.id = place.id;
          point.style.setProperty('--x', `${place.x}%`);
          point.style.setProperty('--y', `${place.y}%`);
          point.setAttribute('aria-label', place.title);

          const label = document.createElement('span');
          label.className = 'editor-label';
          label.textContent = place.title;
          point.appendChild(label);

          point.addEventListener('pointerdown', (event) => {
            event.preventDefault();
            draggingId = place.id;
            point.setPointerCapture(event.pointerId);
            setActive(place.id);
            movePlace(place.id, event.clientX, event.clientY);
          });

          point.addEventListener('pointermove', (event) => {
            if (draggingId !== place.id) return;
            movePlace(place.id, event.clientX, event.clientY);
          });

          point.addEventListener('pointerup', () => {
            draggingId = null;
          });

          pointsEl.appendChild(point);

          const item = document.createElement('button');
          item.className = 'editor-place';
          item.type = 'button';
          item.dataset.id = place.id;
          item.textContent = place.title;
          item.addEventListener('click', () => setActive(place.id));
          listEl.appendChild(item);
        });

        setActive(places[0]?.id || null);
      }

      map.addEventListener('click', (event) => {
        if (!activeId || event.target.closest('.editor-point')) return;
        movePlace(activeId, event.clientX, event.clientY);
      });

      copyBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(outputEl.value);
          copyBtn.textContent = 'Zkopírováno';
          setTimeout(() => copyBtn.textContent = 'Kopírovat JSON', 1200);
        } catch {
          outputEl.select();
        }
      });

      downloadBtn.addEventListener('click', () => {
        const blob = new Blob([outputEl.value + '\n'], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'places.json';
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      });

      fetch('data/places.json')
        .then((response) => response.json())
        .then((data) => {
          places = data;
          render();
        });
    })();
  </script>
</body>
</html>
