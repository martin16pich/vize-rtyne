<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editor Vize Rtyně | Hotspoty a hlavní mapa</title>
  <style>
    :root{--bg:#0d120f;--panel:#121a15;--muted:rgba(255,255,255,.68);--white:#fff;--line:rgba(255,255,255,.14);--accent:#2f8d4e;--danger:#d93b3b}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:#fff;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
    button,input,textarea,select{font:inherit}.app{height:100svh;display:grid;grid-template-columns:minmax(0,1fr) 440px}.stage-wrap{position:relative;overflow:hidden;background:#111}
    .stage{position:absolute;inset:0;overflow:hidden;cursor:crosshair;transform-origin:center}.stage img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;user-select:none;pointer-events:none}.points{position:absolute;inset:0;z-index:2}
    .point{position:absolute;left:var(--x);top:var(--y);width:30px;height:30px;border:2px solid rgba(0,0,0,.18);border-radius:999px;background:#fff;box-shadow:0 12px 32px rgba(0,0,0,.35),0 0 0 6px rgba(255,255,255,.28);transform:translate(-50%,-50%);cursor:grab}
    .point.map-arrow{width:0;height:0;border-radius:0;background:transparent;box-shadow:none;border-top:16px solid transparent;border-bottom:16px solid transparent;border-left:26px solid #fff;border-right:0}.point:hover{background:#111}.point.map-arrow:hover{background:transparent;border-left-color:#111}.point.active{background:var(--danger);box-shadow:0 12px 32px rgba(0,0,0,.35),0 0 0 8px rgba(217,59,59,.35)}.point.map-arrow.active{background:transparent;box-shadow:none;border-left-color:var(--danger)}.point:active{cursor:grabbing}
    .label{position:absolute;left:50%;bottom:calc(100% + 12px);transform:translateX(-50%);background:#fff;color:#111;padding:7px 12px;border-radius:999px;font-size:14px;font-weight:850;white-space:nowrap;box-shadow:0 10px 28px rgba(0,0,0,.22)}.map-arrow .label{left:auto;right:8px;bottom:22px}
    .zoom-bar{position:absolute;z-index:5;left:16px;bottom:16px;display:flex;gap:8px;align-items:center;padding:8px;border-radius:999px;background:rgba(0,0,0,.65);backdrop-filter:blur(8px)}.zoom-bar button{width:36px;height:36px;border:0;border-radius:999px;background:#fff;color:#111;font-weight:900;cursor:pointer}.zoom-bar span{min-width:56px;text-align:center;font-weight:800}
    .panel{background:var(--panel);border-left:1px solid var(--line);padding:20px;overflow:auto}h1{margin:0 0 8px;font-size:26px;letter-spacing:-.03em}p{margin:0 0 16px;color:var(--muted);line-height:1.45;font-weight:650}label{display:block;margin:12px 0 6px;font-weight:850;font-size:13px;color:rgba(255,255,255,.78)}
    select,input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:#070b08;color:#fff;padding:11px 12px;font-size:14px}textarea{min-height:82px;resize:vertical;line-height:1.45}.list{display:grid;gap:8px;margin:14px 0}.list button{border:1px solid var(--line);background:rgba(255,255,255,.06);color:#fff;border-radius:14px;padding:11px 12px;text-align:left;font-weight:850;cursor:pointer}.list button.active{background:#fff;color:#111}
    .coords{padding:12px;border-radius:14px;background:rgba(255,255,255,.08);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.55;margin:14px 0;white-space:pre-wrap}.actions,.manage{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px 0}.actions button,.actions a,.manage button{border:0;border-radius:999px;padding:12px 14px;font-weight:900;cursor:pointer;text-align:center;background:#fff;color:#111;text-decoration:none}.actions .secondary,.manage .secondary{background:rgba(255,255,255,.12);color:#fff}.manage .danger{background:var(--danger);color:#fff}
    .output{min-height:220px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}.help{font-size:13px;color:rgba(255,255,255,.62);margin-top:14px;line-height:1.5}.hint{padding:10px 12px;border-radius:12px;background:rgba(47,141,78,.18);border:1px solid rgba(47,141,78,.35);font-size:13px;line-height:1.45;margin-bottom:14px}.row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}.row button{height:42px;border:0;border-radius:12px;background:#fff;color:#111;font-weight:900;padding:0 14px;cursor:pointer}.field[hidden]{display:none}
    @media(max-width:900px){body{overflow:auto}.app{height:auto;min-height:100svh;display:block}.stage-wrap{height:58svh}.panel{border-left:0;border-top:1px solid var(--line)}}
  </style>
</head>
<body>
<main class="app">
  <section class="stage-wrap">
    <div class="stage" id="stage"><img id="stageImage" src="" alt=""><div class="points" id="points"></div></div>
    <div class="zoom-bar"><button id="zoomOut" type="button">−</button><span id="zoomValue">100 %</span><button id="zoomIn" type="button">+</button><button id="zoomReset" type="button">↺</button></div>
  </section>
  <aside class="panel">
    <h1>Editor Vize Rtyně</h1>
    <p>Upravuje hlavní mapu i hotspoty všech míst. Po dokončení stáhni JSON a nahraď jím soubor ve složce <strong>data</strong>.</p>
    <div class="hint">Bod přetáhni myší nebo posouvej šipkami. <strong>Shift + šipka</strong> = větší krok.</div>
    <label for="placeSelect">Mapa / místo</label>
    <select id="placeSelect">
      <option value="mapa">Hlavní mapa města</option>
      <option value="zabarna">Žabárna</option>
      <option value="kampelicka">Park před Kampeličkou</option>
      <option value="hornicka">Hornická ulice</option>
      <option value="namesti">Náměstí</option>
      <option value="centrum">Centrum města</option>
      <option value="odpady">Odpadová místa</option>
    </select>
    <div class="manage"><button id="addHotspot">＋ Přidat bod</button><button id="duplicateHotspot" class="secondary">Duplikovat</button><button id="deleteHotspot" class="danger">Smazat</button><button id="centerHotspot" class="secondary">Na střed</button></div>
    <div class="list" id="hotspotList"></div><div class="coords" id="coords">Žádný bod.</div>
    <label for="titleInput">Název</label><input id="titleInput">
    <div class="row"><div><label for="idInput">ID</label><input id="idInput"></div><button id="makeId" type="button">Vytvořit z názvu</button></div>
    <div class="field" id="textField"><label for="textInput">Popis</label><textarea id="textInput"></textarea></div>
    <div class="field" id="imageField"><label for="imageInput">Cesta k fotce</label><input id="imageInput"></div>
    <div class="field" id="iconField" hidden><label for="iconInput">Typ bodu na hlavní mapě</label><select id="iconInput"><option value="">Kolečko</option><option value="arrow-right">Trojúhelník doprava</option></select></div>
    <div class="actions"><button id="applyChanges">Použít změny</button><button id="copyJson" class="secondary">Kopírovat JSON</button><button id="downloadJson">Stáhnout JSON</button><a href="index.html" class="secondary">Zpět na web</a></div>
    <textarea class="output" id="output" spellcheck="false"></textarea>
    <div class="help" id="helpText"></div>
  </aside>
</main>
<script>
(function(){
  const configs={
    mapa:{title:'Hlavní mapa města',mode:'map',image:'images/mapa/rtyne-letecky.jpg',data:'data/places.json',download:'places.json'},
    zabarna:{title:'Žabárna',mode:'hotspot',image:'images/zabarna/vize.jpg',data:'data/hotspots.json',download:'hotspots.json'},
    kampelicka:{title:'Park před Kampeličkou',mode:'hotspot',image:'images/kampelicka/vize.jpg',data:'data/kampelicka-hotspots.json',download:'kampelicka-hotspots.json'},
    hornicka:{title:'Hornická ulice',mode:'hotspot',image:'images/hornicka/vize.jpg',data:'data/hornicka-hotspots.json',download:'hornicka-hotspots.json'},
    namesti:{title:'Náměstí',mode:'hotspot',image:'images/namesti/vize.jpg',data:'data/namesti-hotspots.json',download:'namesti-hotspots.json'},
    centrum:{title:'Centrum města',mode:'hotspot',image:'images/centrum/vize.jpg',data:'data/centrum-hotspots.json',download:'centrum-hotspots.json'},
    odpady:{title:'Odpadová místa',mode:'hotspot',image:'images/odpady/vize.jpg',data:'data/odpady-hotspots.json',download:'odpady-hotspots.json'}
  };
  const $=id=>document.getElementById(id); const stage=$('stage'),stageImage=$('stageImage'),pointsEl=$('points'),placeSelect=$('placeSelect'),listEl=$('hotspotList'),coordsEl=$('coords'),titleInput=$('titleInput'),idInput=$('idInput'),textInput=$('textInput'),imageInput=$('imageInput'),iconInput=$('iconInput'),textField=$('textField'),imageField=$('imageField'),iconField=$('iconField'),outputEl=$('output'),helpText=$('helpText');
  let currentKey='mapa',items=[],activeId=null,draggingId=null,zoom=1;
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)); const fmt=v=>Number(v||0).toFixed(2); const cfg=()=>configs[currentKey]; const activeItem=()=>items.find(i=>i.id===activeId)||null;
  function slug(text){return String(text||'novy-bod').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'novy-bod'}
  function uniqueId(base,except){let id=slug(base),n=2;while(items.some(i=>i.id===id&&i.id!==except))id=slug(base)+'-'+n++;return id}
  function serialise(){return items.map(item=>cfg().mode==='map'?{id:item.id,title:item.title,x:Number(fmt(item.x)),y:Number(fmt(item.y)),...(item.icon?{icon:item.icon}:{})}:{id:item.id,...(item.number!==undefined?{number:item.number}:{}),title:item.title,text:item.text||'',image:item.image||'',x:Number(fmt(item.x)),y:Number(fmt(item.y))})}
  function updateOutput(){const a=activeItem(); if(a){coordsEl.textContent=`${a.title||a.id}\nx: ${fmt(a.x)}\ny: ${fmt(a.y)}`;titleInput.value=a.title||'';idInput.value=a.id||'';textInput.value=a.text||'';imageInput.value=a.image||'';iconInput.value=a.icon||''}else{coordsEl.textContent='Žádný bod.';titleInput.value=idInput.value=textInput.value=imageInput.value='';iconInput.value=''} outputEl.value=JSON.stringify(serialise(),null,2);document.querySelectorAll('.point').forEach(p=>p.classList.toggle('active',p.dataset.id===activeId));document.querySelectorAll('.list button').forEach(b=>b.classList.toggle('active',b.dataset.id===activeId))}
  function setActive(id){activeId=id;updateOutput()}
  function moveItem(id,cx,cy){const rect=stage.getBoundingClientRect(),x=clamp(((cx-rect.left)/rect.width)*100,0,100),y=clamp(((cy-rect.top)/rect.height)*100,0,100),item=items.find(i=>i.id===id);if(!item)return;item.x=Number(fmt(x));item.y=Number(fmt(y));const p=document.querySelector(`.point[data-id="${CSS.escape(id)}"]`);if(p){p.style.setProperty('--x',item.x+'%');p.style.setProperty('--y',item.y+'%')}updateOutput()}
  function render(){pointsEl.innerHTML='';listEl.innerHTML='';items.forEach(item=>{const p=document.createElement('button');p.className='point'+(cfg().mode==='map'&&item.icon==='arrow-right'?' map-arrow':'');p.type='button';p.dataset.id=item.id;p.style.setProperty('--x',item.x+'%');p.style.setProperty('--y',item.y+'%');const l=document.createElement('span');l.className='label';l.textContent=item.title||item.id;p.appendChild(l);p.addEventListener('pointerdown',e=>{e.preventDefault();draggingId=item.id;p.setPointerCapture(e.pointerId);setActive(item.id);moveItem(item.id,e.clientX,e.clientY)});p.addEventListener('pointermove',e=>{if(draggingId===item.id)moveItem(item.id,e.clientX,e.clientY)});p.addEventListener('pointerup',()=>draggingId=null);pointsEl.appendChild(p);const row=document.createElement('button');row.type='button';row.dataset.id=item.id;row.textContent=item.title||item.id;row.onclick=()=>setActive(item.id);listEl.appendChild(row)});setActive(items.some(i=>i.id===activeId)?activeId:(items[0]?.id||null))}
  async function loadPlace(key){currentKey=key;activeId=null;const c=cfg();stageImage.src=c.image;stageImage.alt=c.title;textField.hidden=imageField.hidden=c.mode==='map';iconField.hidden=c.mode!=='map';helpText.textContent=c.mode==='map'?`Staženým souborem nahraď ${c.data}. Body hlavní mapy otevírají sekce podle ID.`:`Staženým souborem nahraď ${c.data}. Pokud soubor zatím neexistuje, vlož stažený JSON do složky data.`;try{const r=await fetch(c.data+'?t='+Date.now());items=r.ok?await r.json():[]}catch{items=[]}render()}
  function apply(){const a=activeItem();if(!a)return;const old=a.id;a.title=titleInput.value.trim()||'Nový bod';a.id=uniqueId(idInput.value.trim()||a.title,old);if(cfg().mode==='map')a.icon=iconInput.value;else{a.text=textInput.value.trim();a.image=imageInput.value.trim()}activeId=a.id;render()}
  $('addHotspot').onclick=()=>{const n=items.length+1,id=uniqueId('novy-bod-'+n);const item=cfg().mode==='map'?{id,title:'Nové místo',x:50,y:50}:{id,title:'Nový hotspot',text:'',image:`images/${currentKey}/hotspots/${id}.jpg`,x:50,y:50};items.push(item);activeId=id;render()};
  $('duplicateHotspot').onclick=()=>{const a=activeItem();if(!a)return;const copy=JSON.parse(JSON.stringify(a));copy.id=uniqueId(a.id+'-kopie');copy.title=(a.title||'Bod')+' – kopie';copy.x=clamp(Number(a.x)+3,0,100);copy.y=clamp(Number(a.y)+3,0,100);items.push(copy);activeId=copy.id;render()};
  $('deleteHotspot').onclick=()=>{const a=activeItem();if(!a||!confirm(`Smazat bod „${a.title}“?`))return;items=items.filter(i=>i!==a);activeId=items[0]?.id||null;render()};$('centerHotspot').onclick=()=>{const a=activeItem();if(!a)return;a.x=50;a.y=50;render()};$('applyChanges').onclick=apply;$('makeId').onclick=()=>{idInput.value=uniqueId(titleInput.value,activeId)};
  stage.onclick=e=>{if(activeId&&!e.target.closest('.point'))moveItem(activeId,e.clientX,e.clientY)};
  document.addEventListener('keydown',e=>{if(!activeId||['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName))return;const a=activeItem(),step=e.shiftKey?1:.15;if(!a)return;if(e.key==='ArrowLeft')a.x-=step;else if(e.key==='ArrowRight')a.x+=step;else if(e.key==='ArrowUp')a.y-=step;else if(e.key==='ArrowDown')a.y+=step;else return;e.preventDefault();a.x=clamp(a.x,0,100);a.y=clamp(a.y,0,100);render()});
  function setZoom(v){zoom=clamp(v,1,2.5);stage.style.transform=`scale(${zoom})`;$('zoomValue').textContent=Math.round(zoom*100)+' %'}$('zoomIn').onclick=()=>setZoom(zoom+.15);$('zoomOut').onclick=()=>setZoom(zoom-.15);$('zoomReset').onclick=()=>setZoom(1);stage.addEventListener('wheel',e=>{e.preventDefault();setZoom(zoom+(e.deltaY<0?.1:-.1))},{passive:false});
  $('copyJson').onclick=async()=>{try{await navigator.clipboard.writeText(outputEl.value);$('copyJson').textContent='Zkopírováno';setTimeout(()=>$('copyJson').textContent='Kopírovat JSON',1000)}catch{outputEl.select()}};$('downloadJson').onclick=()=>{apply();const blob=new Blob([outputEl.value+'\n'],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=cfg().download;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)};
  placeSelect.onchange=()=>loadPlace(placeSelect.value);loadPlace(currentKey);
})();
</script>
</body>
</html>
